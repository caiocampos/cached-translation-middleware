name: Deploy

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: 1.26

    - name: Build server
      run: bash server-build.sh

    - name: Build batch
      run: bash batch-build.sh

    - name: Test
      run: go test -v ./...

    - name: Create Release and Upload Binaries
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
           gh release create ${{ github.ref_name }} ./batch ./server --title "Release ${{ github.ref_name }}" --notes "Automatically generated binary."













